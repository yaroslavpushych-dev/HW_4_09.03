<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/card.css">
    <title>Document</title>
</head>

<body>
    <div class="card">

        <div class="wrapper">
            <img src="assets/images/telegram-brands-solid-full.svg" class="tgIcon" alt="telegram icon">
            <p class="residentPlace">Medina, WA, USA</p>
        </div>

        <div class="imageWrapper">
            <img src="assets/images/bill-gates.jpg" alt="Bill Gates Photo">
        </div>

        <h1 class="userName">Bill Gates</h1>

        <p class="bio">
            Bill Gates is an American businessman, programmer, and philanthropist. He is best known as the
            co-founder of Microsoft, one of the world’s largest technology companies.
        </p>

        <button class="followBtn">Follow</button>

        <div class="bottomContainer">

            <div class="block">
                <div>
                    <img src="assets/images/image-regular-full.svg" alt="gallery icon">
                </div>
                <div>
                    <p class="bottomInfo">Posts</p>
                    <p class="bottomInfoCount">635</p>
                </div>
            </div>

            <div class="block">
                <div>
                    <img src="assets/images/heart-regular-full.svg" alt="heart icon">
                </div>
                <div>
                    <p class="bottomInfo">Favorites</p>
                    <p class="bottomInfoCount">3,472</p>
                </div>
            </div>

            <div class="block">
                <div>
                    <img src="assets/images/paper-plane-regular-full.svg" alt="plane icon">
                </div>
                <div>
                    <p class="bottomInfo">Messages</p>
                    <p class="bottomInfoCount">1,293</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
